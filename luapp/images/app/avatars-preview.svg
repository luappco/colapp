  <path d="M45 94 Q50 98 55 94" stroke="#F05572" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- label -->
  <text x="50" y="168" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#2A1A22" font-weight="600">Valentina</text>
  <text x="50" y="180" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#9A8090" letter-spacing="1">34 · BOGOTÁ</text>

  <!-- Avatar 2 — Isabela -->
