  <ellipse cx="50" cy="70" rx="22" ry="18" fill="#2A1A22"/>
  <ellipse cx="34" cy="90" rx="8" ry="14" fill="#2A1A22"/>
  <ellipse cx="66" cy="90" rx="8" ry="14" fill="#2A1A22"/>
