  <!-- Avatar 1 — Valentina -->
  <circle cx="50" cy="100" r="48" fill="url(#g1)" opacity="0.15"/>
  <circle cx="50" cy="85" r="22" fill="#F07855" opacity="0.8"/>
  <ellipse cx="50" cy="130" rx="28" ry="20" fill="#F07855" opacity="0.8"/>
